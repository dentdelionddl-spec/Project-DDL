  <style>
    :root{
      --bg:#F4F4F6;
      --ink:#0A0A0F;
      --blue:#1D1DFF;
      --line:rgba(29,29,255,0.35);
      --line-soft:rgba(10,10,15,0.08);
      --mono:"Pretendard","Inter",system-ui,sans-serif;
      --sans:"Pretendard","Inter",system-ui,sans-serif;
      --display:"Pretendard","Inter",system-ui,sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:var(--sans);
      background:var(--bg);
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      letter-spacing:-0.007em;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none;padding:0;color:inherit}
    img{display:block;max-width:100%}

    .mono{font-family:var(--mono);font-weight:400}
    .label{
      font-family:var(--mono);
      font-size:11px;
      letter-spacing:0.135em;
      text-transform:uppercase;
      color:var(--blue);
    }

    /* Header pill logo */
    .header{
      position:fixed;top:0;left:0;right:0;
      z-index:50;
      display:flex;align-items:center;justify-content:center;
      padding:24px 0 20px;
      background:var(--bg);
      border-bottom:1px solid var(--line);
    }
    .pill{
      width:60px;height:26px;border-radius:999px;
      background:var(--blue);
      cursor:pointer;
      transition:transform .25s ease;
    }
    .pill:hover{transform:scale(1.08)}

    .frame{
      padding-top:71px;
      min-height:100vh;
    }

    .hline{height:1px;background:var(--line);width:100%}

    /* Strip sections (home) */
    .strip{
      display:flex;align-items:center;justify-content:center;
      text-align:center;
      height: calc((100vh - 71px) / 3);
      min-height: 180px;
      color:var(--blue);
      font-family:var(--mono);
      font-size:12px;
      letter-spacing:0.165em;
      text-transform:uppercase;
      cursor:pointer;
      transition:background .25s ease, color .25s ease, letter-spacing .35s ease;
    }
    .strip:hover{
      background:var(--blue);color:#fff;
      letter-spacing:0.225em;
    }

    body.home-locked{overflow:hidden;height:100vh}
    body.home-locked .frame{height:100vh;min-height:100vh;overflow:hidden}
    body.home-locked .strip{height: calc((100vh - 71px) / 3); min-height:0}

    /* Simple page layout */
    .page{padding:40px 40px 120px}
    .page-label{display:block;text-align:center;padding:20px 0}
    .container{max-width:600px;margin:0 auto}
    .container-wide{max-width:1100px;margin:0 auto}

    /* Project list (projects page) */
    .projects-label{padding-top:70px !important; padding-bottom:70px !important}
    .projects-page{padding:0 40px 120px !important}
    .projects-page .proj-card:first-child{margin-top:0}
    .proj-card{
      display:block;
      margin: 80px auto 0;
      max-width:420px;
      cursor:pointer;
    }
    .proj-cover{
      aspect-ratio:4/5;
      background:#8A8574;
      position:relative;
      overflow:hidden;
    }
    .proj-cover .tex{
      position:absolute;inset:0;
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.06) 0, rgba(255,255,255,.06) 2px, transparent 2px, transparent 8px);
    }
    .proj-cover .name{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      color:#fff;
      font-family:var(--display);
      font-weight:500;
      font-size:55px;
      letter-spacing:-0.015em;
      text-align:center;
      line-height:1;
    }
    .proj-cover .sub{
      position:absolute; left:0;right:0; bottom:22%;
      text-align:center;
      color:rgba(255,255,255,0.8);
      font-family:var(--mono);
      font-size:11px;
      letter-spacing:0.15em;
      text-transform:uppercase;
    }
    .proj-btn{
      display:flex;align-items:center;justify-content:center;
      margin-top:18px;
      padding:14px 0;
      border:1px solid var(--blue);
      color:var(--blue);
      font-family:var(--mono);
      font-size:11px;
      letter-spacing:0.15em;
      text-transform:uppercase;
      transition:all .25s ease;
    }
    .proj-card:hover .proj-btn{background:var(--blue);color:#fff}
    .proj-card:hover .proj-cover{transform:scale(0.995)}
    .proj-cover{transition:transform .4s ease}

    /* About page */
    .about-body{
      max-width:520px;
      margin:0 auto;
      font-family:var(--sans);
      font-size:11px;
      letter-spacing:0.04em;
      color:var(--ink);
      line-height:2.0;
      text-align:left;
    }
    .about-sec{margin-bottom:56px}
    .about-sec-label{
      color:var(--blue);
      font-size:11px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:22px;
    }
    .about-sec p{margin:0 0 16px}
    .about-sec p:last-child{margin-bottom:0}
    .about-scope-item{margin-bottom:26px}
    .about-scope-item:last-child{margin-bottom:0}
    .about-scope-item .t{
      color:var(--blue);
      font-size:11px;
      letter-spacing:0.04em;
      margin-bottom:6px;
    }
    .about-scope-item .d{
      color:var(--ink);
      font-size:11px;
      line-height:1.8;
    }

    /* Contact page */
    .contact-h{
      font-family:var(--display);
      font-weight:500;
      font-size:clamp(47px, 8vw, 111px);
      text-align:center;
      letter-spacing:-0.022em;
      margin:60px auto 20px;
      color:var(--blue);
      line-height:0.95;
    }
    .contact-body{
      text-align:left;
      max-width:520px;
      margin:0 auto;
      font-family:var(--sans);
      font-size:11px;
      letter-spacing:0.04em;
      color:var(--ink);
      line-height:1.8;
    }
    .contact-body .row{display:flex;justify-content:space-between;gap:20px;padding:14px 0}
    .contact-body .row span:first-child{color:var(--blue);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap}
    .contact-body .row span:last-child{color:var(--ink);text-align:right}
    .contact-body a{color:inherit;text-decoration:none}
    @media (max-width:560px){
      .contact-body .row{flex-direction:column;align-items:flex-start;gap:6px;padding:12px 0}
      .contact-body .row span:last-child{text-align:left !important;word-break:break-all}
    }

    /* Project detail overlay */
    .detail{
      position:fixed;left:0;right:0;top:67px;bottom:0;z-index:40;
      background:var(--bg);
      overflow-y:auto;
      animation:fadeIn .3s ease;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .detail-close{
      position:absolute;
      top:15px;right:185px;
      width:28px;height:28px;
      display:flex;align-items:center;justify-content:center;
      color:var(--blue);
      font-size:20px;
      font-family:var(--sans);
      z-index:120;
      background:transparent;
      border:none;
      cursor:pointer;
    }
    @media (max-width:900px){
      .detail-close{right:15px}
    }
    .detail-wrap{
      position:relative;
      max-width:900px;
      margin:0 auto;
      min-height:100vh;
    }
    .detail-wrap::before,
    .detail-wrap::after{
      content:"";
      position:absolute;top:0;bottom:0;
      width:1px;background:var(--line);
    }
    .detail-wrap::before{left:170px}
    .detail-wrap::after{right:170px}
    @media (max-width:900px){
      .detail-wrap::before,
      .detail-wrap::after{display:none}
    }
    .detail-inner{
      max-width:460px;
      margin:0 auto;
      padding:56px 24px 120px;
    }
    .detail-title{
      text-align:center;
      font-family:var(--sans);
      font-size:11px;
      letter-spacing:0.165em;
      color:var(--blue);
      text-transform:uppercase;
      margin:0 0 80px;
    }
    .detail-sec{margin-bottom:24px}
    .detail-sec-label{
      font-family:var(--sans);
      font-size:11px;
      letter-spacing:0.12em;
      color:var(--blue);
      text-transform:uppercase;
      margin-bottom:10px;
    }
    .detail-sec-body{
      font-family:var(--sans);
      font-size:11px;
      color:var(--blue);
      line-height:1.7;
    }
    .detail-sec-body p{margin:0 0 3px}
    .ba-block{margin-top:22px}
    .ba-label{
      font-family:var(--sans);
      font-size:11px;
      letter-spacing:0.12em;
      color:var(--blue);
      text-transform:uppercase;
      margin-bottom:14px;
    }
    .ba-img{
      width:100%;
      height:auto;
      display:block;
      background:#CFC7B6;
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.08) 0, rgba(255,255,255,.08) 2px, transparent 2px, transparent 8px);
      aspect-ratio:3/4;
      margin-bottom:30px;
    }

    .detail-side{display:none}

    /* Fade/slide in page switching */
    .page-enter{animation: enter .35s ease both}
    @keyframes enter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* Tweaks panel */
    .tweak-panel{
      position:fixed;bottom:20px;right:20px;width:260px;
      background:var(--bg);border:1px solid var(--blue);
      z-index:200;font-family:var(--sans);
    }
    .tweak-panel header{
      padding:12px 16px;background:var(--blue);color:#fff;
      display:flex;justify-content:space-between;
      font-family:var(--mono);font-size:10px;letter-spacing:0.112em;text-transform:uppercase;
    }
    .tweak-panel .body{padding:16px;display:flex;flex-direction:column;gap:18px}
    .tweak-group-label{font-family:var(--mono);font-size:10px;letter-spacing:0.09em;color:var(--blue);text-transform:uppercase;margin-bottom:8px}
    .swatches{display:flex;gap:6px;flex-wrap:wrap}
    .sw{width:26px;height:26px;cursor:pointer;border:1px solid var(--line-soft)}
    .sw.active{outline:2px solid var(--ink);outline-offset:1px}
    .opt-row{display:flex;gap:4px}
    .opt{
      flex:1;font-family:var(--mono);font-size:10px;padding:8px 6px;
      border:1px solid var(--line-soft);background:transparent;color:var(--ink);
      letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;
    }
    .opt.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  </style>

      },
      about: [
        "덴트델리온은 패션 브랜드의 운영과 전략을 설계하는 에이전시입니다.",
        "브랜드의 시작부터 다음 시즌까지, 진단·전략·실행·리뷰의 사이클을 함께 돌립니다.",
        "한 시즌의 성공이 아닌, 3~5년 뒤에도 살아남는 브랜드를 만듭니다.",
      ],
    };
  </script>

  <script type="text/babel">
    const DATA = window.DDL_DATA_MIN;

    const SCOPE_OF_WORK = [
      { t: "브랜드 기획 / 전략", d: "브랜드 캔버스 정의, 연간 사업계획, 월간 전략수립, 월간 손익현황, 제품 기획, 라인시트 작성" },
      { t: "SNS 콘텐츠 운영 (EGC)", d: "콘텐츠 전략 수립, 레퍼런스 아카이빙, 인스타·스레드 오리지널 콘텐츠 기획·촬영·보정·업로드, 콘텐츠 분석 로그 관리" },
      { t: "인플루언서 / 크리에이터 협업 (UGC)", d: "크리에이터 리서치·선정, 브랜더진 ZVZO 등 채널 연계 캠페인 생성, 협업 제안서 작성" },
      { t: "커머스 / 판매 인프라 운영", d: "입점몰 관리, 광고운영, 할인설정, 상세페이지 제작, 오프라인 팝업 기획 및 진행" },
      { t: "제품 / 생산 운영", d: "제품 기획 및 제작, 파우치·패키징 제작, 콜라보 협업" },
      { t: "운영 툴 / 시스템 구축", d: "노션 운영 관리 페이지 구축" },
    ];

    function Header({ onHome }) {
      return (
        <div className="header">
          <button className="pill" onClick={onHome} aria-label="home" />
        </div>
      );
    }

    function Home({ setPage }) {
      return (
        <>
          <div className="strip" onClick={() => setPage("projects")}>DDL PROJECTS</div>
          <div className="hline" />
          <div className="strip" onClick={() => setPage("about")}>ABOUT</div>
          <div className="hline" />
          <div className="strip" onClick={() => setPage("contact")}>CONTACT</div>
          <div className="hline" />
        </>
      );
    }

    function Projects({ onOpen }) {
      return (
        <>
          <div className="page-label label projects-label">/ DDL PROJECTS</div>
          <div className="page projects-page">
            {DATA.projects.map((p) => (
              <div className="proj-card" key={p.id} onClick={() => onOpen(p.id)}>
                <div className="proj-cover">
                  <div className="tex" />
                  <div className="name">{p.name}<br/><span style={{fontSize:27,opacity:0.85}}>{p.nameLine2}</span></div>
                </div>
                <div className="proj-btn">{p.name.toUpperCase()} {p.nameLine2.toUpperCase()}</div>
              </div>
            ))}
          </div>
        </>
      );
    }

    function About() {
      return (
        <>
          <div className="page-label label projects-label">/ ABOUT</div>
          <div className="page container projects-page">
            <div className="about-body">
              <div className="about-sec">
                <div className="about-sec-label">/ MISSION</div>
                <p>스몰 브랜드의 최우선 과제는 ‘생존’입니다.</p>
                <p>생존은 리스크를 관리하는 것에서 시작됩니다. 팀 DDL은 여러 브랜드를 직접 운영하며 축적한 실무 데이터를 바탕으로 파트너사의 시행착오를 최소화하고, 불필요한 비용과 시간을 아낍니다.</p>
                <p>저희는 브랜드가 시장에 깊게 뿌리 내리고, 100명의 브랜드 팬분들과 함께 꽃을 피울 수 있도록 가장 현실적인 성장의 동력을 제공합니다.</p>
              </div>

              <div className="about-sec">
                <div className="about-sec-label">/ SCOPE OF WORK</div>
                {SCOPE_OF_WORK.map((s, i) => (
                  <div className="about-scope-item" key={i}>
                    <div className="t">{s.t}</div>
                    <div className="d">{s.d}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </>
      );
    }

    function Contact() {
      const c = DATA.contact;
      return (
        <>
          <div className="page-label label projects-label">/ CONTACT</div>
          <div className="page container projects-page">
            <div className="contact-body">
              <div className="row"><span>/ EMAIL</span><span><a href="mailto:dentdelion.ddl@gmail.com">dentdelion.ddl@gmail.com</a></span></div>
              <div className="row"><span>/ ADDRESS</span><span style={{textAlign:"right"}}>502, 71 Kimsangok-ro Jongno-gu Seoul Korea</span></div>
              <div className="row"><span>/ THREADS</span><span><a href="https://threads.com/@sh.tribe" target="_blank" rel="noreferrer">threads.com/@sh.tribe</a></span></div>
            </div>
          </div>
        </>
      );
    }

    function Detail({ id, onClose }) {
      const p = DATA.projects.find((x) => x.id === id);
      React.useEffect(() => {
        document.body.style.overflow = "hidden";
        const esc = (e) => e.key === "Escape" && onClose();
        window.addEventListener("keydown", esc);
        return () => { document.body.style.overflow = ""; window.removeEventListener("keydown", esc); };
      }, []);
      if (!p) return null;
      const fullName = (p.name + " " + p.nameLine2).trim();
      const blocks = [
        { num: "01", tag: "Diagnosis", body: p.diagnosis },
        { num: "02", tag: "Solution", body: p.solution },
        { num: "03", tag: "Identity", body: p.identity },
      ];
      return (
        <div className="detail">
          <div className="detail-wrap">
            <button className="detail-close" onClick={onClose} aria-label="close">×</button>
            <div className="detail-inner">
              <div className="detail-title">/ {fullName.toUpperCase()}</div>

              <div className="detail-sec">
                <div className="detail-sec-label" style={{marginBottom:50}}>/ SCOPE OF WORK</div>
                <div className="detail-sec-body">
                  {SCOPE_OF_WORK.map((s, i) => (
                    <div className="about-scope-item" key={i} style={{marginBottom:18}}>
                      <div className="t" style={{color:"var(--blue)",marginBottom:4}}>{s.t}</div>
                      <div className="d" style={{color:"var(--ink)",lineHeight:1.8}}>{s.d}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="detail-sec" style={{marginTop:50,marginBottom:0}}>
                <div className="detail-sec-label" style={{marginBottom:50}}>/ ARCHIVE</div>
              </div>

              <div className="ba-block" style={{marginTop:0}}>
                <div className="ba-label">BEFORE</div>
                <div className="ba-img" />
              </div>

              <div className="ba-block">
                <div className="ba-label">AFTER</div>
                <div className="ba-img" style={{background:p.cover}} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    function TweakPanel({ tweaks, setTweak }) {
      const accents = [
        { name: "Blue", value: "#1D1DFF" },
        { name: "Ink", value: "#0A0A0F" },
        { name: "Olive", value: "#5C6B3A" },
        { name: "Terracotta", value: "#C24E2F" },
      ];
      const bgs = [
        { name: "Cool", value: "#F4F4F6" },
        { name: "Warm", value: "#F5F1EA" },
        { name: "White", value: "#FFFFFF" },
      ];
      return (
        <div className="tweak-panel">
          <header><span>/ Tweaks</span><span>min</span></header>
          <div className="body">
            <div>
              <div className="tweak-group-label">/ Accent</div>
              <div className="swatches">
                {accents.map(a => (
                  <button key={a.value} className={`sw ${tweaks.accentColor===a.value?"active":""}`} style={{background:a.value}} onClick={()=>setTweak("accentColor", a.value)} title={a.name}/>
                ))}
              </div>
            </div>
            <div>
              <div className="tweak-group-label">/ Background</div>
              <div className="opt-row">
                {bgs.map(b => (
                  <button key={b.value} className={`opt ${tweaks.bgColor===b.value?"active":""}`} onClick={()=>setTweak("bgColor", b.value)}>{b.name}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="tweak-group-label">/ Density</div>
              <div className="opt-row">
                {["airy","compact"].map(d=>(
                  <button key={d} className={`opt ${tweaks.density===d?"active":""}`} onClick={()=>setTweak("density", d)}>{d}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = React.useState(() => localStorage.getItem("ddl-min-page") || "home");
      const [openId, setOpenId] = React.useState(null);
      const [tweakMode, setTweakMode] = React.useState(false);
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

      React.useEffect(()=>{ localStorage.setItem("ddl-min-page", page); window.scrollTo(0,0); document.body.classList.toggle("home-locked", page === "home"); }, [page]);

      React.useEffect(() => {
        const r = document.documentElement;
        r.style.setProperty("--blue", tweaks.accentColor);
        r.style.setProperty("--bg", tweaks.bgColor);
        r.style.setProperty("--line", tweaks.accentColor + "59");
        if (tweaks.density === "compact") document.body.style.fontSize = "14px"; else document.body.style.fontSize = "";
      }, [tweaks]);

      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === "__activate_edit_mode") setTweakMode(true);
          if (e.data?.type === "__deactivate_edit_mode") setTweakMode(false);
        };
        window.addEventListener("message", handler);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", handler);
      }, []);

      const setTweak = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      };

      return (
        <>
          <Header onHome={() => { setOpenId(null); setPage("home"); }} />
          <div className="frame" key={page}>
            <div className="page-enter">
              {page === "home" && <Home setPage={setPage} />}
              {page === "projects" && <Projects onOpen={setOpenId} />}
              {page === "about" && <About />}
              {page === "contact" && <Contact />}
            </div>
          </div>
          {openId && <Detail id={openId} onClose={() => setOpenId(null)} />}
          {tweakMode && <TweakPanel tweaks={tweaks} setTweak={setTweak} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
